  <title>Боевой модуль v8.0 fix</title>
  <style>
    body{font-family:sans-serif;background:#1e1e1e;color:#ddd;margin:10px}
    button,select,input,textarea{font-size:.9rem;padding:5px 8px;margin:2px;border-radius:4px;border:none}
    button{background:#c0392b;color:#fff;font-weight:bold;cursor:pointer}
    button:active{background:#e74c3c}
    .card{background:#2c2c2c;padding:6px;margin:4px 0;border-radius:6px}
    .dead{background:#7f0000;color:#ccc;text-decoration:line-through}
    .morale-bar{height:8px;background:#27ae60;border-radius:4px;margin:2px 0}
    .log{background:#111;color:#aaa;font-family:monospace;font-size:.8rem;padding:6px;margin-top:8px;border-radius:4px;max-height:150px;overflow-y:auto}
    .tab{overflow:hidden;border-bottom:2px solid #555;margin-bottom:8px}
    .tab button{background-color:inherit;float:left;border:none;padding:8px 14px;font-size:.85rem;color:#aaa}
    .tab button.active{background-color:#c0392b;color:#fff}
    .tabcontent{display:none}
    .section{margin:8px 0}
    .squad-header img{max-height:60px;border-radius:4px;vertical-align:middle;margin-right:8px}
    .shot-summary{background:#3a3a3a;padding:6px;border-radius:4px;margin:8px 0;font-size:1.2rem;font-weight:bold}
  </style>
</head>

  <h2>⚔️ Боевой модуль v8.0 fix</h2>
  <div class="tab">

    <button class="tablinks" onclick="openTab(event,'rosterTab')">👥 Состав</button>
    <button class="tablinks" onclick="openTab(event,'weaponTab')">🔫 Оружие</button>
    <button class="tablinks" onclick="openTab(event,'crewTab')">💣 Расчёты</button>
    <button class="tablinks" onclick="openTab(event,'cardsTab')">🃏 Карты</button>
    <button class="tablinks" onclick="openTab(event,'saveTab')">💾 Шаблоны</button>
  </div>

  <div id="battleTab" class="tabcontent" style="display:block">
    <div class="section">
      <label>Фильтр по фракции: <select id="battleFactionFilter" onchange="renderTemplateSelection()"><option value="">Все</option></select></label>
      <div id="templateSelection"></div>
      <button onclick="addSelectedTemplatesToBattle()">Добавить в бой</button>
    </div>
    <div id="squadContainer"></div>
    <div id="moraleContainer"></div>
    <button onclick="attack()">🎯 Атаковать</button>
    <div class="log" id="log"></div>
  </div>

    let appData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || getDefaultData();
    if(!appData.templates) appData.templates=[];
    if(appData.squads.length===0) appData.squads = appData.templates.map(t=>JSON.parse(JSON.stringify(t)));

    let currentSquadIndex = 0;
    let currentSquad = appData.squads[0];

    function updateUI(){
      const c=document.getElementById('squadContainer');
      if(!currentSquad) return;
      c.innerHTML=currentSquad.fighters.map(f=>`<div class="card"><strong>${f.name}</strong> [${f.weapon}] HP:${f.hp}/${f.maxHp}</div>`).join('');
    }

    function attack(){
      if(!currentSquad) return;
      const weapons=getFactionWeapons(currentSquad.faction);
      log(`=== АТАКА (${currentSquad.name}) ===`);
      currentSquad.fighters.forEach(f=>{
        if(f.hp===0) return;
        const w=weapons.find(w=>w.name===f.weapon);
        if(!w){log(`${f.name}: оружие не найдено`);return;}
        log(`${f.name}: выстрелов ${w.values[rollD6()-1]}`);
      });
    }

    function renderTemplateSelection(){
      const container=document.getElementById('templateSelection');
      const filter=document.getElementById('battleFactionFilter').value;
      const list=filter ? appData.templates.filter(t=>t.faction===filter) : appData.templates;
      container.innerHTML=list.map((t,i)=>`<label><input type="checkbox" class="template-check" value="${i}"> ${t.name}</label><br>`).join('');
    }

    function addSelectedTemplatesToBattle(){
      document.querySelectorAll('.template-check:checked').forEach(cb=>{
        const t=JSON.parse(JSON.stringify(appData.templates[parseInt(cb.value)]));
        t.currentMorale=t.baseMorale;
        appData.squads.push(t);
      });
      currentSquad=appData.squads[appData.squads.length-1];
      localStorage.setItem(STORAGE_KEY,JSON.stringify(appData));
      updateUI();
    }

    function openTab(evt,tabName){
      document.querySelectorAll('.tabcontent').forEach(e=>e.style.display='none');
      document.querySelectorAll('.tablinks').forEach(e=>e.classList.remove('active'));
      document.getElementById(tabName).style.display='block';
      evt.currentTarget.classList.add('active');
      if(tabName==='battleTab') renderTemplateSelection();
    }

    updateUI();
    renderTemplateSelection();
  </script>
